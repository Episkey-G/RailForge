name: build-binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "railforge-v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Build binaries
        run: python scripts/build_binaries.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: railforge-${{ matrix.os }}
          path: dist/*
